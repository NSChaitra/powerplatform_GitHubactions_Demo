name: Export Dataverse Data

on:
  workflow_dispatch:
    inputs:
      environment_url:
        description: "Environment URL (e.g., https://org.crm.dynamics.com)"
        required: true
        type: string

      schema_file:
        description: "Schema file path in repo (e.g., config/schema.xml)"
        required: true
        type: string

      data_file:
        description: "Output zip path (e.g., exports/data.zip)"
        required: false
        default: "exports/data.zip"
        type: string

      cloud:
        description: "Cloud (Public, GCC, GCCHigh, DoD etc.)"
        required: false
        default: "Public"
        type: string

      overwrite:
        description: "Overwrite output file if it exists"
        required: false
        default: true
        type: boolean

      verbose:
        description: "Verbose logging"
        required: false
        default: false
        type: boolean

jobs:
  export:
    runs-on: ubuntu-latest
    # If your secrets are stored under a GitHub Environment, uncomment and set it:
    # environment: Dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Power Platform Tools (PAC)
        uses: microsoft/powerplatform-actions/actions-install@v1  # ✅ correct action
        # 'install@v1' does not exist; must be actions-install@v1 [1](https://learn.microsoft.com/en-us/power-platform/alm/devops-github-available-actions)[2](https://github.com/marketplace/actions/powerplatform-actions)

      - name: Validate secrets (Service Principal)
        shell: bash
        run: |
          set -e
          if [[ -z "${{ secrets.PP_APP_ID }}" || -z "${{ secrets.PP_TENANT_ID }}" || -z "${{ secrets.PASSWORD }}" ]]; then
            echo "ERROR: Missing secrets. Please set PP_APP_ID, PP_TENANT_ID, secrets.PASSWORD  in GitHub Secrets."
            exit 1
          fi

      - name: Ensure output folder exists
        shell: bash
        run: |
          set -e
          mkdir -p "$(dirname "${{ inputs.data_file }}")"

      - name: Export Data (official action)
        uses: microsoft/powerplatform-actions/export-data@v1
        with:
          environment-url: ${{ inputs.environment_url }}
          schema-file: ${{ inputs.schema_file }}
          data-file: ${{ inputs.data_file }}
          cloud: ${{ inputs.cloud }}
          overwrite: ${{ inputs.overwrite }}
          verbose: ${{ inputs.verbose }}
          app-id: ${{ secrets.PP_APP_ID }}
          tenant-id: ${{ secrets.PP_TENANT_ID }}
          client-secret: ${{ secrets.PASSWORD }}

      - name: Upload exported data as artifact
        uses: actions/upload-artifact@v4
        with:
          name: exported-data
          path: ${{ inputs.data_file }}
