name: Create Power Platform Environment

on:
  workflow_dispatch:
    inputs:
      env_name:
        description: "Environment display name"
        required: true
        type: string
      region:
        description: "Region (e.g., unitedstates, india, europe)"
        required: true
        default: "unitedstates"
        type: string
      env_type:
        description: "Environment type"
        required: true
        default: "Sandbox"
        type: choice
        options:
          - Sandbox
          - Production
          - Trial
          - SubscriptionBasedTrial

jobs:
  create_environment:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Power Platform Tools (PAC)
        uses: microsoft/powerplatform-actions/actions-install@v1
        
     

      - name: Run local create-environment action 
        id: create
        uses: ./.github/actions/create-environment
        with:
          # AUTH (service principal)
          app-id: '4fec5240-fd45-408b-8276-d60c97798c49'
          client-secret: ${{ secrets.PASSWORD }}
          tenant-id: 'db05faca-c82a-4b9d-b9c5-0f64b6755421'

          # REQUIRED
          name: ${{ inputs.env_name }}
          region: ${{ inputs.region }}
          type: ${{ inputs.env_type }}

      - name: Print outputs
        run: |
          echo "Environment URL: ${{ steps.create.outputs.environment-url }}"
          echo "Environment ID : ${{ steps.create.outputs.environment-id }}"
