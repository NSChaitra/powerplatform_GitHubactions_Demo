name: Create Power Platform Environment

on:
  workflow_dispatch:
    inputs:
      env_name:
        description: "Environment display name"
        required: true
        type: string
      region:
        description: "Region (e.g., unitedstates, india, europe)"
        required: true
        default: "unitedstates"
        type: string
      env_type:
        description: "Environment type"
        required: true
        default: "Sandbox"
        type: choice
        options:
          - Sandbox
          - Production
          - Trial
          - SubscriptionBasedTrial

jobs:
  create_environment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🔎 Debug: prove whether action.yml exists at the expected path
      - name: Debug - show action files
        shell: bash
        run: |
          echo "PWD: $(pwd)"
          echo "=== Root ==="
          ls -la
          echo "=== .github ==="
          ls -la .github || true
          echo "=== .github/actions ==="
          ls -la .github/actions || true
          echo "=== .github/actions/create-environment ==="
          ls -la .github/actions/create-environment || true
          echo "=== Find any action.yml in repo ==="
          find . -maxdepth 5 -type f \( -name "action.yml" -o -name "action.yaml" \) -print

      - name: Run local create-environment action
        id: create
        uses: ./.github/actions/create-environment
        with:
          # AUTH (service principal)
          app-id: ${{ secrets.PP_APP_ID }}
          tenant-id: ${{ secrets.PP_TENANT_ID }}
          client-secret: ${{ secrets.PASSWORD }}

          # REQUIRED
          name: ${{ inputs.env_name }}
          region: ${{ inputs.region }}
          type: ${{ inputs.env_type }}

      - name: Print outputs
        run: |
          echo "Environment URL: ${{ steps.create.outputs.environment-url }}"
          echo "Environment ID : ${{ steps.create.outputs.environment-id }}"
