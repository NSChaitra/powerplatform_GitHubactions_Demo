name: Create Environment

on:
  workflow_dispatch:
    inputs:
      environment_name:
        description: Environment display name
        required: true
        type: string
      region:
        description: Asxower Platform region
        required: true
        type: string

jobs:
  create:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Power Platform Tools
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Create Environment
        uses: microsoft/powerplatform-actions/create-environment@v1
        with:
          name: ${{ inputs.environment_name }}        # ✅ REQUIRED
          region: ${{ inputs.region }}                # ✅ REQUIRED
          tenant-id: ${{ secrets.PP_TENANT_ID }}
          app-id: ${{ secrets.PP_APP_ID }}
          client-secret: ${{ secrets.PASSWORD }}
