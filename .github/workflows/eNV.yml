name: Create Power Platform Environment

on:
  workflow_dispatch:
    inputs:
      env_name:
        description: "Environment display name (required)"
        required: true
        type: string
      region:
        description: "Region (e.g., unitedstates, europe, india)"
        required: true
        default: "unitedstates"
        type: string
      env_type:
        description: "Environment type (Sandbox, Production, Trial, SubscriptionBasedTrial)"
        required: true
        default: "Sandbox"
        type: choice
        options:
          - Sandbox
          - Production
          - Trial
          - SubscriptionBasedTrial
      currency:
        description: "Currency code (e.g., USD, INR)"
        required: false
        default: "USD"
        type: string
      language:
        description: "Language (e.g., English (United States))"
        required: false
        default: "English (United States)"
        type: string
      domain:
        description: "Domain prefix (optional). Example: contoso for https://contoso.crm.dynamics.com"
        required: false
        type: string
      templates:
        description: "Dynamics templates (comma-separated) (optional)"
        required: false
        type: string
      user:
        description: "Admin user UPN or object id to assign (optional)"
        required: false
        type: string
      security_group_id:
        description: "Entra Security Group ID (optional)"
        required: false
        type: string

jobs:
  create_environment:
    name: Create Environment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # If your action expects pac to be present inside its Node code, ensure your Node action installs/uses pac.
      # If YOU need pac available before action runs, add steps here to install pac.

      - name: Create Power Platform environment
        id: create
        uses: ./.github/actions/create-environment
        with:
          # ---- AUTH (choose one method) ----
          # Option A: Service principal (recommended)
          app-id: ${{ secrets.PP_APP_ID }}
          tenant-id: ${{ secrets.PP_TENANT_ID }}
          client-secret: ${{ secrets.PASSWORD }}

          # Option B: Username/password (not recommended)
          # user-name: ${{ secrets.PP_USERNAME }}
          # password-secret: ${{ secrets.PP_PASSWORD }}

          # ---- REQUIRED INPUTS ----
          name: ${{ inputs.env_name }}
          region: ${{ inputs.region }}
          type: ${{ inputs.env_type }}

          # ---- OPTIONAL INPUTS ----
          currency: ${{ inputs.currency }}
          language: ${{ inputs.language }}
          domain: ${{ inputs.domain }}
          templates: ${{ inputs.templates }}
          user: ${{ inputs.user }}
          security-group-id: ${{ inputs.security_group_id }}

      - name: Print outputs
        run: |
          echo "Environment URL: ${{ steps.create.outputs.environment-url }}"
          echo "Environment ID : ${{ steps.create.outputs.environment-id }}"
