name: Create Power Platform Environment

on:
  workflow_dispatch:
    inputs:
      env_name:
        description: "Environment display name (required)"
        required: true
        type: string

      region:
        description: "Region (e.g., unitedstates, europe, india)"
        required: true
        default: "unitedstates"
        type: string

      env_type:
        description: "Environment type"
        required: true
        default: "Sandbox"
        type: choice
        options:
          - Sandbox
          - Production
          - Trial
          - SubscriptionBasedTrial

      currency:
        description: "Currency code (e.g., USD, INR)"
        required: false
        default: "USD"
        type: string

      language:
        description: "Language (e.g., English (United States))"
        required: false
        default: "English (United States)"
        type: string

      domain:
        description: "Domain prefix (optional) e.g. contoso for https://contoso.crm.dynamics.com"
        required: false
        type: string

      templates:
        description: "Dynamics templates (comma-separated) (optional)"
        required: false
        type: string

      user:
        description: "Admin user UPN or object id to assign (optional)"
        required: false
        type: string

      security_group_id:
        description: "Entra Security Group ID (optional)"
        required: false
        type: string

jobs:
  create_environment:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Debug step to ensure paths exist on runner
      - name: Debug - list action folder
        run: |
          echo "Workspace: $(pwd)"
          ls -la
          echo "---- .github ----"
          ls -la .github
          echo "---- .github/actions ----"
          ls -la .github/actions || true
          echo "---- .github/actions/create-environment ----"
          ls -la .github/actions/create-environment || true
          echo "---- dist inside action ----"
          ls -la .github/actions/create-environment/dist/actions/create-environment || true

      - name: Create Power Platform environment
        id: create
        uses: ./.github/actions/create-environment
        with:
          # AUTH (Service Principal recommended)
          app-id: ${{ secrets.PP_APP_ID }}
          tenant-id: ${{ secrets.PP_TENANT_ID }}
          client-secret: ${{ secrets.PASSWORD }}

          # REQUIRED
          name: ${{ inputs.env_name }}
          region: ${{ inputs.region }}
          type: ${{ inputs.env_type }}

          # OPTIONAL
          currency: ${{ inputs.currency }}
          language: ${{ inputs.language }}
          domain: ${{ inputs.domain }}
          templates: ${{ inputs.templates }}
          user: ${{ inputs.user }}
          security-group-id: ${{ inputs.security_group_id }}

      - name: Print outputs
        run: |
          echo "Environment URL: ${{ steps.create.outputs.environment-url }}"
          echo "Environment ID : ${{ steps.create.outputs.environment-id }}"
``
