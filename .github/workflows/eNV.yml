name: Create Environment

on:
  workflow_dispatch:
    inputs:
      environment_name:
        required: true
      region:
        required: true

jobs:
  create:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PAC CLI
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Authenticate
        uses: microsoft/powerplatform-actions/authenticate@v1
        with:
          application-id: ${{ secrets.PP_APP_ID }}
          tenant-id: ${{ secrets.PP_TENANT_ID }}
          client-secret: ${{ secrets.PASSWORD}}
          environment: ${{ secrets.PP_ENV_URL }}

      - name: Create environment
        uses: ./.github/actions/create-environment
        with:
          environment_name: ${{ github.event.inputs.environment_name }}
          region: ${{ github.event.inputs.region }}
