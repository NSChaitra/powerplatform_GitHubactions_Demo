name: Export Dataverse Data

on:
  workflow_dispatch:
    inputs:
      environment_url:
        description: "Environment URL (e.g., https://org.crm.dynamics.com)"
        required: true
        type: string

      schema_file:
        description: "Schema file path in repo (e.g., config/schema.xml)"
        required: true
        type: string

      data_file:
        description: "Output zip path (e.g., exports/data.zip)"
        required: false
        default: "exports/data.zip"
        type: string

      cloud:
        description: "Cloud (Public, GCC, GCCHigh, DoD etc.)"
        required: false
        default: "Public"
        type: string

      overwrite:
        description: "Overwrite output file if it exists"
        required: false
        default: true
        type: boolean

      verbose:
        description: "Verbose logging"
        required: false
        default: false
        type: boolean

jobs:
  export:
    runs-on: windows-latest   # ✅ REQUIRED for export-data

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Power Platform Tools
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Validate required secrets
        shell: pwsh
        run: |
          if (-not $env:PP_APP_ID -or -not $env:PP_TENANT_ID -or -not $env:PP_CLIENT_SECRET) {
            Write-Error "Missing one or more secrets: PP_APP_ID, PP_TENANT_ID, PP_CLIENT_SECRET"
            exit 1
          }

      - name: Ensure output directory exists
        shell: pwsh
        run: |
          $dir = Split-Path "${{ inputs.data_file }}"
          if ($dir -and !(Test-Path $dir)) {
            New-Item -ItemType Directory -Path $dir | Out-Null
          }

      - name: Export Dataverse Data
        uses: microsoft/powerplatform-actions/export-data@v1
        with:
          environment-url: ${{ inputs.environment_url }}
          schema-file: ${{ inputs.schema_file }}
          data-file: ${{ inputs.data_file }}
          cloud: ${{ inputs.cloud }}
          overwrite: ${{ inputs.overwrite }}
          verbose: ${{ inputs.verbose }}
          app-id: ${{ secrets.PP_APP_ID }}
          tenant-id: ${{ secrets.PP_TENANT_ID }}
          client-secret: ${{ secrets.PP_CLIENT_SECRET }}

      - name: Upload exported data
        uses: actions/upload-artifact@v4
      - name: Install Power Platform Tools (PAC)
        uses: microsoft/powerplatform-actions/actions-install@v1 
        with:
          name: exported-data
          path: ${{ inputs.data_file }}
