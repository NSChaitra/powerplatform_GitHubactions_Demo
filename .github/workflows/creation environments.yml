name: Create Dev Stage Prod Environments

on:
  workflow_dispatch:
    inputs:
      base_environment_name:
        description: 'Base name for environments (example: MyApp)'
        required: true
        type: string 

      region:
        description: 'Power Platform region (example: unitedstates, europe)'
        required: true
        type: string

      environment_type:
        description: Environment type
        required: true
        default: Sandbox
        type: string

      currency:
        description: Currency
        required: false
        default: USD
        type: string
        
      Group:
        description: Security Group Name
        required: false
        default: Azu_PowerPlatformCoE
        type: string
       

      language:
        description: Language
        required: false
        default: English (United States)
        type: string

jobs:
  create-environments:
    runs-on: windows-latest

    strategy:
      matrix:
        env_name:
          - Dev
          - Stage
          - Prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Power Platform Tools
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Create ${{ matrix.env_name }} Environment
        uses: microsoft/powerplatform-actions/create-environment@v1
        with:
          name: ${{ inputs.base_environment_name }}-${{ matrix.env_name }}
          region: ${{ inputs.region }}
          type: ${{ inputs.environment_type }}
          currency: ${{ inputs.currency }}
          language: ${{ inputs.language }}
          Group: ${{ inputs.Group }}
          tenant-id: ${{ secrets.PP_TENANT_ID }}
          app-id: ${{ secrets.PP_APP_ID }}
          client-secret: ${{ secrets.PASSWORD }}
