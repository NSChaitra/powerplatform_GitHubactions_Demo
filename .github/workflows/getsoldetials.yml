name: List Power Platform Solutions

on:
  workflow_dispatch:
    inputs:
      environment_url:
        description: "Dataverse Environment URL"
        required: true
        type: string

jobs:
  list-solutions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Power Platform CLI
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Authenticate to Power Platform
        uses: microsoft/powerplatform-actions/authenticate@v1
        with:
          environment-url: ${{ inputs.environment_url }}
          tenant-id: ${{ secrets.TENANT_ID }}
          app-id: ${{ secrets.CLIENT_ID }}
          client-secret: ${{ secrets.PASSWORD }}

      - name: List solutions (table)
        run: |
          pac solution list

      - name: List solutions (JSON)
        run: |
          pac solution list --json > solutions.json
          cat solutions.json

      - name: Upload solution list
        uses: actions/upload-artifact@v4
        with:
          name: powerplatform-solutions
          path: solutions.json
