name: List Power Platform Solutions

on:
  workflow_dispatch:
    inputs:
      environmentUrl:
        description: "Dataverse Environment URL (https://xxxx.crm.dynamics.com)"
        required: true
        type: string

jobs:
  list-solutions:
    runs-on: ubuntu-latest

    steps:
      - name: Install Power Platform CLI
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Authenticate
        run: |
          $POWERPLATFORMTOOLS_PACPATH auth create \
            --url "${{ inputs.environmentUrl }}" \
            --tenant "${{ secrets.TENANT_ID }}" \
            --applicationId "${{ secrets.CLIENT_ID }}" \
            --clientSecret "${{ secrets.CLIENT_SECRET }}"

      - name: List Solutions
        run: |
          $POWERPLATFORMTOOLS_PACPATH solution list \
            --environment "${{ inputs.environmentUrl }}"
