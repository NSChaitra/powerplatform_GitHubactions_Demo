name: Export Power Platform Solution Details

on:
  workflow_dispatch:
    inputs:
      ENVIRONMENT_URL:
        description: "Power Platform Environment URL"
        required: true
        type: string

jobs:
  export-solutions:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install PAC CLI (official method)
      - name: Install Power Platform CLI
        uses: microsoft/powerplatform-actions/actions-install@v1

      # Authenticate
      - name: Authenticate to Power Platform
        uses: microsoft/powerplatform-actions/authenticate@v1
        with:
          tenant-id: ${{ secrets.PP_TENANT_ID }}
          client-id: ${{ secrets.PP_CLIENT_ID }}
          client-secret: ${{ secrets.PP_CLIENT_SECRET }}
          environment-url: ${{ inputs.ENVIRONMENT_URL }}

      # Export solution list
      - name: Export solution details
        shell: bash
        run: |
          mkdir -p output

          pac solution list \
            --environment ${{ inputs.ENVIRONMENT_URL }} \
            --json > output/solution-details.json

      # Upload artifact
      - name: Upload solution details
        uses: actions/upload-artifact@v4
        with:
          name: solution-details
          path: output/solution-details.json
