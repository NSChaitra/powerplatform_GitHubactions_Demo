name: Export Dataverse Config Data (Admin)

on:
  workflow_dispatch:
    inputs:
      environment_url:
        description: "Dataverse Environment URL (https://org.crm.dynamics.com)"
        required: true
      schema_file:
        description: "Path to schema file in repo (e.g., data/schema.xml)"
        required: true
        default: "data/schema.xml"
      output_data_file:
        description: "Output zip file name"
        required: true
        default: "data.zip"

jobs:
  export_data:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install Power Platform tooling used by actions (recommended by MS Learn)
      - name: Install Power Platform Tools
        uses: microsoft/powerplatform-actions/actions-install@v1
        # actions-install is documented as the first step to avoid tool/timeouts
        # [4](https://learn.microsoft.com/en-us/power-platform/alm/devops-github-available-actions)

      - name: Export Data from Dataverse
        uses: microsoft/powerplatform-actions/export-data@v1
        with:
          environment-url: ${{ inputs.environment_url }}
          app-id: ${{ secrets.PP_APP_ID }}
          tenant-id: ${{ secrets.PP_TENANT_ID }}
          client-secret: ${{ secrets.PASSWORD }}
          schema-file: ${{ inputs.schema_file }}
          data-file: ${{ inputs.output_data_file }}
          overwrite: true

      - name: Upload exported data artifact
        uses: actions/upload-artifact@v4
        with:
          name: exported-dataverse-data
          path: ${{ inputs.output_data_file }}
