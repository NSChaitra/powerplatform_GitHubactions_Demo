name: List Power Platform Solutions

on:
  workflow_dispatch:
    inputs:
      environment_url:
        description: "Dataverse Environment URL"
        required: true
        type: string

jobs:
  list-solutions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Power Platform CLI
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: who-am-i action
        uses: microsoft/powerplatform-actions/who-am-i@v0
        with:
          environment-url: ${{ inputs.environment_url }}
          tenant-id: 'db05faca-c82a-4b9d-b9c5-0f64b6755421'
          app-id: '4fec5240-fd45-408b-8276-d60c97798c49'
          client-secret: ${{ secrets.PASSWORD }}

      - name: List solutions (table)
        run: |
          pac solution list

      - name: List solutions (JSON)
        run: |
          pac solution list --json > solutions.json
          cat solutions.json

      - name: Upload solution list
        uses: actions/upload-artifact@v4
        with:
          name: powerplatform-solutions
          path: solutions.json
