name: List Power Platform Solutions

on:
  workflow_dispatch:
    inputs:
      environment_url:
        description: "Dataverse Environment URL"
        required: true
        type: string

jobs:
  list-solutions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ Correct install action (exists in repo)
      - name: Install Power Platform Tools
        uses: microsoft/powerplatform-actions/actions-install@v1

      # ✅ Authenticate using PAC CLI (since authenticate@v1 action isn't present)
      - name: Authenticate to Power Platform (Service Principal)
        run: |
          pac auth create \
            --url "${{ inputs.environment_url }}" \
            --tenant "${{ secrets.TENANT_ID }}" \
            --applicationId "${{ secrets.CLIENT_ID }}" \
            --clientSecret "${{ secrets.CLIENT_SECRET }}"

      - name: List solutions (table)
        run: |
          pac solution list

      - name: List solutions (JSON)
        run: |
          pac solution list --json > solutions.json
          cat solutions.json

      - name: Upload solution list
        uses: actions/upload-artifact@v4
        with:
          name: powerplatform-solutions
          path: solutions.json
