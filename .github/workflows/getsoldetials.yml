name: Export Dataverse Data

on:
  workflow_dispatch:
    inputs:
      environment_url:
        description: "Environment URL (e.g., https://org.crm.dynamics.com)"
        required: true
        type: string
      schema_file:
        description: "Schema file path in repo (e.g., config/schema.xml)"
        required: true
        type: string
      data_file:
        description: "Output zip path (e.g., exports/data.zip)"
        required: true
        type: string
      cloud:
        description: "Cloud (Public, GCC, GCCHigh, DoD, etc.)"
        required: false
        default: "Public"
        type: string
      overwrite:
        description: "Overwrite if file exists"
        required: false
        default: "true"
        type: boolean
      verbose:
        description: "Verbose logs"
        required: false
        default: "false"
        type: boolean

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Power Platform Tools
        uses: microsoft/powerplatform-actions/actions-install@v1

      # If you are using PAC directly in your action internally, you may not need this.
      # But leaving it here is useful if your export action expects pac available.
      - name: Install Power Platform Tools
        uses: microsoft/powerplatform-actions/actions-install@v1

      # --- Auth choice: App Id / Secret / Tenant (recommended) ---
      # Store these in GitHub Secrets:
      #   PP_APP_ID, PP_TENANT_ID, PP_CLIENT_SECRET
      #
      # --- OR Username/Password secret auth ---
      # Store in GitHub Secrets:
      #   PP_USERNAME, PP_PASSWORD
      #
      # IMPORTANT: Use only ONE method.

      - name: Validate auth inputs
        shell: bash
        run: |
          set -e
          app_set="false"
          user_set="false"

          if [[ -n "${{ secrets.PP_APP_ID }}" && -n "${{ secrets.PP_TENANT_ID }}" && -n "${{ secrets.PP_CLIENT_SECRET }}" ]]; then
            app_set="true"
          fi

          if [[ -n "${{ secrets.PP_USERNAME }}" && -n "${{ secrets.PP_PASSWORD }}" ]]; then
            user_set="true"
          fi

          if [[ "$app_set" == "false" && "$user_set" == "false" ]]; then
            echo "ERROR: Provide either (PP_APP_ID, PP_TENANT_ID, PP_CLIENT_SECRET) OR (PP_USERNAME, PP_PASSWORD) in secrets."
            exit 1
          fi

          if [[ "$app_set" == "true" && "$user_set" == "true" ]]; then
            echo "ERROR: Do not provide both auth methods. Choose one."
            exit 1
          fi

      - name: Export Data (using local action)
        uses: ./.github/actions/export-data
        with:
          environment-url: ${{ inputs.environment_url }}
          schema-file: ${{ inputs.schema_file }}
          data-file: ${{ inputs.data_file }}
          cloud: ${{ inputs.cloud }}
          overwrite: ${{ inputs.overwrite }}
          verbose: ${{ inputs.verbose }}
          # App auth
          app-id: '4fec5240-fd45-408b-8276-d60c97798c49'
          client-secret: ${{ secrets.PASSWORD }}
          tenant-id: 'db05faca-c82a-4b9d-b9c5-0f64b6755421'
          # OR username/password auth (leave secrets empty if not used)
          user-name: 
          password-secret: 

      - name: Upload exported data zip as artifact
        uses: actions/upload-artifact@v4
      - name: Install Power Platform Tools
        uses: microsoft/powerplatform-actions/actions-install@v1

        with:
          name: exported-data
          path: ${{ inputs.data_file }}
