name: List Power Platform Solutions

on:
  workflow_dispatch:
    inputs:
      environment_url:
        description: "Dataverse Environment URL (https://org.crm.dynamics.com)"
        required: true
        type: string

jobs:
  list-solutions:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # ✅ Install PAC CLI (Linux-compatible)
      - name: Install Power Platform CLI (PAC)
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y tar

          curl -L -o pac.tar.gz \
            https://github.com/microsoft/powerplatform-cli/releases/latest/download/pac_linux_x64.tar.gz

          tar -xvf pac.tar.gz
          sudo mv pac /usr/local/bin/pac
          sudo chmod +x /usr/local/bin/pac

          pac --version
          which pac

      # ✅ Authenticate using Service Principal
      - name: Authenticate
        run: |
          pac auth create \
            --url "${{ inputs.environment_url }}" \
            --tenant "${{ secrets.TENANT_ID }}" \
            --applicationId "${{ secrets.CLIENT_ID }}" \
            --clientSecret "${{ secrets.CLIENT_SECRET }}"

      # ✅ List solutions
      - name: List solution details
        run: |
          pac solution list --json > solutions.json
          cat solutions.json

      - name: Upload solution list
        uses: actions/upload-artifact@v4
        with:
          name: solutions
          path: solutions.json
