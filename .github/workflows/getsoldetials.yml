
name: List Power Platform Solutions

on:
  workflow_dispatch:
    inputs:
      environment_url:
        description: "Dataverse Environment URL (https://org.crm.dynamics.com)"
        required: true
        type: string

jobs:
  list-solutions:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # ✅ Install .NET (required for PAC via dotnet tool)
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # ✅ Install PAC CLI (cross-platform) using .NET tool
      - name: Install Power Platform CLI (PAC)
        shell: bash
        run: |
          set -euo pipefail

          dotnet --info

          # Install PAC as a global dotnet tool
          dotnet tool install --global Microsoft.PowerApps.CLI.Tool

          # Add dotnet tools to PATH for this workflow step and subsequent steps
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

          pac --version
          which pac

      # ✅ Authenticate using Service Principal
      - name: Authenticate
        shell: bash
        run: |
          set -euo pipefail
          pac auth create \
            --url "${{ inputs.environment_url }}" \
            --tenant "${{ secrets.TENANT_ID }}" \
            --applicationId "${{ secrets.CLIENT_ID }}" \
            --clientSecret "${{ secrets.CLIENT_SECRET }}"

      # ✅ List solutions
      - name: List solution details
        shell: bash
        run: |
          set -euo pipefail
          pac solution list --json > solutions.json
          echo "Saved solutions.json"
          cat solutions.json

      - name: Upload solution list
        uses: actions/upload-artifact@v4
        with:
          name: solutions
          path: solutions.json
