name: List Power Platform Solutions

on:
  workflow_dispatch:
    inputs:
      environment_url:
        description: "Dataverse Environment URL"
        required: true
        type: string

jobs:
  list-solutions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Power Platform Tools (PAC)
        uses: microsoft/powerplatform-actions/actions-install@v1
      - name: who-am-i action
        uses: microsoft/powerplatform-actions/who-am-i@v0
        with:
          environment-url: ${{ inputs.environment_url }}
          tenant-id: ${{ secrets.TENANT_ID }}
          app-id: ${{ secrets.CLIENT_ID }}
          client-secret: ${{ secrets.CLIENT_SECRET }}

      # List solutions (table output)
      - name: List solutions (table)
        run: |
          pac solution list

      # List solutions (JSON output)
      - name: List solutions (JSON)
        run: |
          pac solution list --json > solutions.json
          cat solutions.json

      # Upload solution list as artifact
      - name: Upload solution list
        uses: actions/upload-artifact@v4
      - name: Install Power Platform Tools (PAC)
        uses: microsoft/powerplatform-actions/actions-install@v1
        with:
          name: powerplatform-solutions
          path: solutions.json
