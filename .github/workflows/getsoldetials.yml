name: List Power Platform Solutions

on:
  workflow_dispatch:
    inputs:
      environment_url:
        description: "Dataverse Environment URL"
        required: true
        type: string

jobs:
  list-solutions:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # Install PAC CLI without using microsoft/powerplatform-actions
      # (Uses Microsoft learn-supported "pac auth create" later)
      - name: Install Power Platform CLI (pac)
        run: |
          sudo apt-get update
          # If your org blocks apt repositories, use Option 2 or a self-hosted runner.
          sudo apt-get install -y unzip
          echo "PAC installation method depends on enterprise allowlists."
          echo "If you have an approved internal installer/source, plug it here."

      - name: Authenticate with PAC (Service Principal)
        run: |
          pac auth create \
            --url "${{ inputs.environment_url }}" \
            --tenant "${{ secrets.TENANT_ID }}" \
            --applicationId "${{ secrets.CLIENT_ID }}" \
            --clientSecret "${{ secrets.CLIENT_SECRET }}"
        # pac auth create is the supported non-interactive auth approach [3](https://github.com/microsoft/powerplatform-actions)

      - name: List solutions (JSON)
        run: |
          pac solution list --json > solutions.json
          cat solutions.json

      - name: Upload solution list
        uses: actions/upload-artifact@v4
        with:
          name: powerplatform-solutions
          path: solutions.json
